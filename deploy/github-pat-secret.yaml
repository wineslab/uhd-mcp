apiVersion: v1
kind: Secret
metadata:
  name: github-pat
  namespace: your-namespace
type: Opaque
data:
  # Base64 encoded GitHub Personal Access Token
  # Replace 'your-github-pat-token-here' with your actual token
  # To encode: echo -n 'your-actual-token' | base64
  token: secret_to_change
---
# Alternative: Create the secret using kubectl command instead of this file:
# kubectl create secret generic github-pat-secret \
#   --from-literal=token=your-actual-github-pat-token \
#   --namespace=your-namespace
