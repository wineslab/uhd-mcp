apiVersion: v1
kind: Secret
metadata:
  name: github-pat
  namespace: your-namespace
type: Opaque
data:
  # Base64-encoded GitHub Personal Access Token.
  # To encode: echo -n 'your-actual-token' | base64
  token: <base64-encoded-token>
---
# Alternative: create the secret with kubectl instead of this file:
# kubectl create secret generic github-pat \
#   --from-literal=token=your-actual-github-pat-token \
#   --namespace=your-namespace
