kind: Deployment
apiVersion: apps/v1
metadata:
  name: uhd-mcp
  # Replace with your target namespace
  namespace: your-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uhd-mcp
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: uhd-mcp
      annotations:
        # Pin CPU/IRQ for the radio workload (optional; OpenShift performance profile)
        cpu-load-balancing.crio.io: disable
        cpu-quota.crio.io: disable
        irq-load-balancing.crio.io: disable
        # Attach the dedicated radio network. Replace with your SR-IOV network name.
        k8s.v1.cni.cncf.io/networks: your-sriov-network
    spec:
      containers:
        - resources:
            limits:
              # Replace with your SR-IOV resource (e.g. openshift.io/<your_sriov_resource>: '1')
              your-sriov-resource: '1'
          terminationMessagePath: /dev/termination-log
          name: container
          command:
            - ./start.sh
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_SHARED_DATA_DIR
              value: "/data/shared"
            # Optional: only needed if you use the PAT_TOKEN repo auto-update path.
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
          imagePullPolicy: Always
          terminationMessagePolicy: File
          # Replace with your container image reference
          image: 'REPLACE_ME/uhd-mcp:latest'
          volumeMounts:
            - name: mcp-shared-data-layer-volume
              mountPath: /data/shared
      volumes:
        - name: mcp-shared-data-layer-volume
          persistentVolumeClaim:
            claimName: mcp-shared-data-layer-pvc
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      # On OpenShift the platform assigns an arbitrary non-root UID/GID from the
      # namespace range, so you normally omit runAsUser/runAsGroup/fsGroup and let
      # the SCC inject them. Set them explicitly only on plain Kubernetes.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      schedulerName: default-scheduler