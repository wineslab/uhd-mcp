kind: Deployment
apiVersion: apps/v1
metadata:
  name: uhd-mcp
  namespace: mcp-services
  annotations:
    cpu-load-balancing.crio.io: disable
    cpu-quota.crio.io: disable
    deployment.kubernetes.io/revision: '11'
    irq-load-balancing.crio.io: disable
    k8s.v1.cni.cncf.io/networks: worker-microway-radio-network-sriov-mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: uhd-mcp
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: uhd-mcp
    spec:
      securityContext:
        runAsUser: 1002220000
        runAsGroup: 1002220000
        fsGroup: 1002220000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: container
          image: 'image-registry.openshift-image-registry.svc:5000/deployment-pipeline/mcp-uhd:latest'
          command:
            - ./start.sh
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      restartPolicy: Always