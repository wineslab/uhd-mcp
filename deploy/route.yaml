apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: uhd-mcp-route
  namespace: your-namespace
  labels:
    app: uhd-mcp
spec:
  # OpenShift assigns a host automatically, or set one explicitly:
  # host: uhd-mcp.your-domain.example
  to:
    kind: Service
    name: uhd-mcp-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
