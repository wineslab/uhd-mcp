apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: uhd-mcp-route
  namespace: mcp-services
  labels:
    app: uhd-mcp
spec:
  to:
    kind: Service
    name: uhd-mcp-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
