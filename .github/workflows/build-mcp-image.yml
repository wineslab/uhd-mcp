name: Build MCP image

# Builds ghcr.io/wineslab/uhd-mcp on every release tag (X.Y.Z, no "v" prefix),
# reusing the published deps image so the release build is fast. Can also be
# exercised via workflow_dispatch (build-only by default) for validation.
#
# Prerequisite: the ghcr.io/wineslab/uhd-mcp-deps image must exist (see
# build-deps-image.yml) and be readable by this repo.

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to ghcr.io"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          test "$(cat VERSION)" = "$GITHUB_REF_NAME" || {
            echo "Tag $GITHUB_REF_NAME does not match VERSION file ($(cat VERSION))"; exit 1;
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wineslab/uhd-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build (and optionally push) MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          build-args: |
            DEPS_IMAGE=ghcr.io/wineslab/uhd-mcp-deps:uhd4.7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ startsWith(github.ref, 'refs/tags/') || inputs.push == true }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
