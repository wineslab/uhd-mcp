name: Build MCP image

# Builds ghcr.io/wineslab/uhd-mcp, reusing the published deps image so the
# release build is fast. Invoked by release.yml (VERSION bump on main) or by a
# manual X.Y.Z tag push; workflow_dispatch gives a build-only dry run.
# Image tags are derived from the VERSION file, which the guard keeps equal to
# the git tag on tag pushes.

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to ghcr.io"
        type: boolean
        default: false
  workflow_call:
    inputs:
      push:
        description: "Push the image to ghcr.io"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=${VERSION%.*}" >> $GITHUB_OUTPUT

      - name: Check tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          test "$(cat VERSION)" = "$GITHUB_REF_NAME" || {
            echo "Tag $GITHUB_REF_NAME does not match VERSION file ($(cat VERSION))"; exit 1;
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wineslab/uhd-mcp
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
            type=sha

      - name: Build (and optionally push) MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          build-args: |
            DEPS_IMAGE=ghcr.io/wineslab/uhd-mcp-deps:uhd4.7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ startsWith(github.ref, 'refs/tags/') || inputs.push == true }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
