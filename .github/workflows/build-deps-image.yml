name: Build deps image

# Builds ghcr.io/wineslab/uhd-mcp-deps — the runtime-dependency layer (GNU Radio,
# pipx, FPGA images) on top of the org UHD base image. Rebuilt rarely: on manual
# dispatch or whenever deploy/Dockerfile changes on main.
#
# Prerequisite: this repo must have read access to the ghcr.io/wineslab/uhd
# package (package settings → Manage Actions access).

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to ghcr.io"
        type: boolean
        default: true
      uhd_base_image:
        description: "UHD base image to build on"
        default: "ghcr.io/wineslab/uhd:4.7"
  push:
    branches: [main]
    paths: ["deploy/Dockerfile"]

permissions:
  contents: read
  packages: write

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) deps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          target: deps
          platforms: linux/amd64
          build-args: |
            UHD_BASE_IMAGE=${{ inputs.uhd_base_image || 'ghcr.io/wineslab/uhd:4.7' }}
          tags: |
            ghcr.io/wineslab/uhd-mcp-deps:uhd4.7
            ghcr.io/wineslab/uhd-mcp-deps:uhd4.7-${{ github.run_number }}
          push: ${{ github.event_name == 'push' || inputs.push }}
