name: Build and Package USRP Proxy Extension

# Release flow: bump VERSION and merge to main — release.yml tags the commit
# and calls this workflow. Pushing a matching tag by hand also works.
# manifest.json / package.json are stamped from VERSION at build time so they
# can never drift. workflow_dispatch gives a build-only dry run.
on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
  workflow_call:
    inputs:
      release:
        description: "Create the GitHub release (the version tag must exist)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-proxy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read version from VERSION file
      id: get_version
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: $VERSION"

    - name: Check tag matches VERSION
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        test "$(cat VERSION)" = "$GITHUB_REF_NAME" || {
          echo "Tag $GITHUB_REF_NAME does not match VERSION file ($(cat VERSION))"; exit 1;
        }

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies and dev tools
      working-directory: src/usrp_proxy_dxt
      run: npm install --include=dev

    - name: Stamp manifest.json and package.json versions from VERSION
      working-directory: src/usrp_proxy_dxt
      run: |
        node -e "
          const fs = require('fs');
          const version = fs.readFileSync('../../VERSION', 'utf8').trim();
          for (const file of ['manifest.json', 'package.json']) {
            const m = JSON.parse(fs.readFileSync(file, 'utf8'));
            m.version = version;
            fs.writeFileSync(file, JSON.stringify(m, null, 2) + '\n');
          }
        "

    - name: Create proxy package
      run: |
        cd src/usrp_proxy_dxt
        npx dxt pack .
        mv *.dxt ../../usrp-proxy-${{ steps.get_version.outputs.version }}.dxt

    - name: Generate package checksums
      run: |
        sha256sum usrp-proxy-${{ steps.get_version.outputs.version }}.dxt > checksums.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: usrp-proxy-${{ steps.get_version.outputs.version }}
        path: |
          usrp-proxy-${{ steps.get_version.outputs.version }}.dxt
          checksums.txt
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/') || inputs.release == true
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: uhd-mcp ${{ steps.get_version.outputs.version }}
        body: |
          **Version:** ${{ steps.get_version.outputs.version }}
          **Commit:** ${{ github.sha }}

          Includes the USRP MCP Proxy Desktop Extension (`.dxt`). The container
          image for this release is published as
          `ghcr.io/wineslab/uhd-mcp:${{ steps.get_version.outputs.version }}`.
        files: |
          usrp-proxy-${{ steps.get_version.outputs.version }}.dxt
          checksums.txt
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
