name: Build and Package USRP Proxy Extension

# Release flow: bump VERSION, then push a tag matching it (e.g. 0.1.0).
# The tag is the single trigger for the proxy release; manifest.json is
# stamped from VERSION at build time so it can never drift.
on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-proxy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read version from VERSION file
      id: get_version
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: $VERSION"

    - name: Check tag matches VERSION
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        test "$(cat VERSION)" = "$GITHUB_REF_NAME" || {
          echo "Tag $GITHUB_REF_NAME does not match VERSION file ($(cat VERSION))"; exit 1;
        }

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies and dev tools
      working-directory: src/usrp_proxy_dxt
      run: npm install --include=dev

    - name: Stamp manifest.json version from VERSION
      working-directory: src/usrp_proxy_dxt
      run: |
        node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          m.version = fs.readFileSync('../../VERSION', 'utf8').trim();
          fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
        "

    - name: Create proxy package
      run: |
        cd src/usrp_proxy_dxt
        npx dxt pack .
        mv *.dxt ../../usrp-proxy-${{ steps.get_version.outputs.version }}.dxt

    - name: Generate package checksums
      run: |
        sha256sum usrp-proxy-${{ steps.get_version.outputs.version }}.dxt > checksums.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: usrp-proxy-${{ steps.get_version.outputs.version }}
        path: |
          usrp-proxy-${{ steps.get_version.outputs.version }}.dxt
          checksums.txt
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: uhd-mcp ${{ steps.get_version.outputs.version }}
        body: |
          **Version:** ${{ steps.get_version.outputs.version }}
          **Commit:** ${{ github.sha }}

          Includes the USRP MCP Proxy Desktop Extension (`.dxt`). The container
          image for this release is published as
          `ghcr.io/wineslab/uhd-mcp:${{ steps.get_version.outputs.version }}`.
        files: |
          usrp-proxy-${{ steps.get_version.outputs.version }}.dxt
          checksums.txt
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
